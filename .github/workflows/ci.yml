name: CI

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run check
      - run: npm run build
        env:
          VITE_DEEPDIVE_ENABLED: "0"

  deployment-image:
    needs: frontend
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Audit deployable artifacts
        run: bash scripts/check_deploy_artifacts.sh
      - name: Build and smoke-test Railway image
        run: bash scripts/smoke_railway_image.sh
